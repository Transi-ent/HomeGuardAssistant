services:
  server:
    build:
      context: ../server-go
    image: homeguard-server:local
    ports:
      - "38080:38080"
    environment:
      HG_ADDR: ":38080"
      HG_DATA_DIR: "/data"
      HG_MEDIA_DIR: "/data/media"
      HG_DEFAULT_USER: "${HG_DEFAULT_USER:-admin}"
      HG_DEFAULT_PASS: "${HG_DEFAULT_PASS:-12345678}"
      HG_SESSION_SECRET: "${HG_SESSION_SECRET:-please-change-me}"
    volumes:
      - ../.data/server:/data
